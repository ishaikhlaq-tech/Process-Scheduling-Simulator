<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analyzing Data...</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">

  <style>
    /* Centering specific to the Loading Page */
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #121212;
      margin: 0;
      overflow: hidden;
    }

    /* Main Wrapper */
    .loader-wrapper {
      position: relative;
      width: 160px; /* Slightly bigger area */
      height: 160px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- 1. THE NEON RING (Inner Track) --- */
    .big-ring {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 6px dashed rgba(0, 242, 254, 0.2);
      border-top: 6px dashed #00f2fe;
      /* border-right: 6px dashed #00f2fe; Removed for cleaner track look */
      border-radius: 50%;
      /* Ring spins slowly clockwise */
      animation: spin 3s linear infinite;
      box-shadow: 0 0 30px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0, 242, 254, 0.1);
    }

    /* --- 2. THE ORBIT CONTAINER (Invisible holder for the chick) --- */
    .chuza-orbit {
        position: absolute;
        width: 120px; /* Same width as ring path */
        height: 120px;
        border-radius: 50%;
        /* Orbit spins faster to make chick run */
        animation: spin 1.5s linear infinite;
        z-index: 10; /* Sit on top of ring */
    }

    /* --- 3. THE CHUZA (Detailed Shape) --- */
    .chuza-body {
      position: absolute;
      /* Position at top center of the orbit container */
      top: -15px; 
      left: 50%;
      transform: translateX(-50%);
      
      width: 35px;
      height: 35px;
      background: #ffd700; /* Yellow */
      /* Egg shape */
      border-radius: 50% 50% 45% 45%; 
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
      
      /* Add a little running jiggle */
      animation: runJiggle 0.3s infinite alternate ease-in-out;
    }

    /* The Red Comb (Punk Hair) on top */
    .chuza-body::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 8px;
      background: #ff4b4b; /* Red */
      border-radius: 10px 10px 0 0;
    }

    /* Eyes and Beak Container */
    .face {
        position: relative;
        width: 100%; height: 100%;
    }

    /* Eyes */
    .face::before {
      content: '';
      position: absolute;
      top: 35%; left: 22%;
      width: 4px; height: 4px; background: #000; border-radius: 50%;
      box-shadow: 16px 0 0 #000; /* Second eye */
    }

    /* Beak */
    .face::after {
      content: '';
      position: absolute;
      top: 55%; left: 50%;
      transform: translate(-50%, 0) rotate(45deg);
      width: 5px; height: 5px;
      background: #ff6b00; /* Orange */
    }


    /* --- TEXT STYLES --- */
    h2 {
      margin-top: 50px;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      letter-spacing: 2px;
      animation: pulseText 1.5s infinite alternate;
    }

    p {
      color: #888;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    /* --- ANIMATIONS --- */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Makes the chick bounce slightly while running */
    @keyframes runJiggle {
      0% { margin-top: 0; }
      100% { margin-top: -3px; }
    }

    @keyframes pulseText {
      0% { opacity: 0.7; text-shadow: 0 0 5px #00f2fe; }
      100% { opacity: 1; text-shadow: 0 0 20px #00f2fe; }
    }
  </style>
</head>
<body>

  <div class="loader-wrapper">
     <div class="big-ring"></div>
    
    <div class="chuza-orbit">
        <div class="chuza-body">
            <div class="face"></div>
        </div>
    </div>
  </div>

  <h2>ANALYZING PROCESSES</h2>
  <p>The chuza is running the numbers...</p>

  <script src="loading.js"></script>

</body>
</html>
